version: "3.9"

services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3307:3306"

    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --auto_increment_increment=2
      --auto_increment_offset=1

    volumes:
      - master-data:/var/lib/mysql
      - ./master/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - replication-network

  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3308:3306"

    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --auto_increment_increment=2
      --auto_increment_offset=2

    volumes:
      - slave-data:/var/lib/mysql
      - ./slave/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - replication-network

volumes:
  master-data:
  slave-data:

networks:
  replication-network:
    driver: bridge