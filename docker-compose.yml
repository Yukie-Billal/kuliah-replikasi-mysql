version: "3.9"

services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: praktikum

    ports:
      - "3307:3306"

    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON

    volumes:
      - master-data:/var/lib/mysql
      - ./master/init:/docker-entrypoint-initdb.d

    networks:
      - replication-network

  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3308:3306"

    command: >
      --server-id=2
      --relay-log=relay-bin
      --read-only=ON
      --gtid-mode=ON
      --enforce-gtid-consistency=ON

    depends_on:
      - mysql-master

    volumes:
      - slave-data:/var/lib/mysql

    networks:
      - replication-network

volumes:
  master-data:
  slave-data:

networks:
  replication-network:
    driver: bridge